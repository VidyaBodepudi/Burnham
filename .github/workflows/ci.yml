name: Burnham CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cmake:
    name: CMake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DBURNHAM_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  sanitizers:
    name: ASan UBSan (Ubuntu Clang)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure
        env:
          CXX: clang++
        run: >-
          cmake -S . -B build-sanitize
          -DCMAKE_BUILD_TYPE=Debug
          -DBURNHAM_BUILD_TESTS=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build-sanitize --config Debug
      - name: Test
        run: ctest --test-dir build-sanitize -C Debug --output-on-failure

  windows-phase5:
    name: Windows Direct Clang Phase 5
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install LLVM
        run: choco install llvm -y --no-progress
      - name: Verify text foundation and package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\verify-phase5.ps1 -BenchRecordCount 80 -BenchRepeatCount 1